    const feedbackAquiDB2 = firebase.database().ref("feedbackAqui");

function obterDetalhesConsumidor() {
    const consumerDetailsContainer = document.getElementById("consumerDetails");
    const commentsListContainer = document.getElementById("commentsList");

    // Obter detalhes do consumidor
    feedbackAquiDB2.child("consumidores").child(consumerId).once("value")
        .then((consumerSnapshot) => {
            const consumerData = consumerSnapshot.val();

            const biConsumidor = consumerData.bi || "bi não encontrado";
            const nomeConsumidor = consumerData.nome || "Nome não encontrado";
            const emailConsumidor = consumerData.email || "Email não encontrado";
            const provinciaConsumidor = consumerData.provincia || "provincia não encontrado";
            const cidadeConsumidor = consumerData.cidade || "cidade não encontrado";
            const dataNascimentoConsumidor = consumerData.dataNascimento || "dataNascimento não encontrado";
            const celularConsumidor = consumerData.celular || "celular não encontrado";


            // Exibir detalhes do consumidor
            const consumerDetailsHTML = `
                <p><strong>BI:</strong> ${biConsumidor}</p>
                <p><strong>Nome:</strong> ${nomeConsumidor}</p>
                <p><strong>Email:</strong> ${emailConsumidor}</p>
                <p><strong>Provinvia:</strong> ${provinciaConsumidor}</p>
                <p><strong>Cidade:</strong> ${cidadeConsumidor}</p>
                <p><strong>Data de nascimento:</strong> ${dataNascimentoConsumidor}</p>
                <p><strong>Celular:</strong> ${celularConsumidor}</p>
            `;
            consumerDetailsContainer.innerHTML = consumerDetailsHTML;
            obterEExibirAvaliacoes();
        })
        .catch((error) => {
            console.error("Erro ao obter detalhes do consumidor: " + error);
            // Tratar o erro conforme necessário
        });

}

// Obter comentários associados ao consumidor

function obterEExibirAvaliacoes() {
    // Referência ao nó de avaliações
    const avaliacoesRef = feedbackAquiDB2.child("avaliacoes");
    const consumerId = getParameterByName('consumerId');
    console.log("Duas vezes" + consumerId);

    // Consulta para obter as avaliações específicas para o consumidor
    avaliacoesRef.orderByChild("userId").equalTo(consumerId).on("value", (snapshot) => {
        const avaliacoes = [];
        const comentariosPromises = [];

        snapshot.forEach((childSnapshot) => {
            const data = childSnapshot.val();
            avaliacoes.push(data.starRating);

            const userPromise = Promise.resolve({ nome: data.comment }); // Use a propriedade correta para o nome

            comentariosPromises.push(userPromise);
        });

        // Espera que todas as promessas sejam resolvidas antes de prosseguir
        Promise.all(comentariosPromises)
            .then((comentarios) => {
                console.log("Avaliações encontradas:", avaliacoes);
                exibirComentarios(comentarios);
            })
            .catch((error) => {
                console.error("Erro ao obter dados do usuário: " + error);
            });
    }, (error) => {
        console.error("Erro ao obter as avaliações: " + error);
    });
}

// Restante do código permanece o mesmo...


function exibirComentarios(comentarios) {
    const commentsList = document.getElementById("commentsList");

    // Limpar a lista de comentários antes de adicionar os novos
    commentsList.innerHTML = "";
    comentarios.forEach((comentario) => {
        const listItem = document.createElement("li");

        const nameElement = document.createElement("strong");
        nameElement.textContent = comentario.nome;

        // Supondo que a avaliação tenha uma propriedade 'comentario'
        const commentElement = document.createElement("p");
        // commentElement.textContent = comentario.comentario || "Comentário não encontrado";

        listItem.appendChild(nameElement);
        listItem.appendChild(commentElement);

        commentsList.appendChild(listItem);
    });
}
 


// Execute a função quando a página carregar
window.onload = obterDetalhesConsumidor;
    function getParameterByName(name) {
        name = name.replace(/[\[]/, "\\[").replace(/[\]]/, "\\]");
        var regex = new RegExp("[\\?&]" + name + "=([^&#]*)");
        var results = regex.exec(location.search);
        return results === null ? "" : decodeURIComponent(results[1].replace(/\+/g, " "));
    }

    function suspendConsumidor(){
 // Lógica para suspender o e-commerce por um tempo
 console.log('E-commerce suspenso por tempo');

        // Pergunta ao usuário se ele realmente deseja suspender o e-commerce
        const confirmSuspend = confirm("Tem certeza de que deseja suspender este consumidor?");

        if (confirmSuspend) {
        // Se o usuário confirmar, execute a suspensão

        // obter o ID do consumidor
        const consumerId = getParameterByName('consumerId');

        console.log(consumerId);

        const consumidoreRef = feedbackAquiDB2.child("consumidores").child(consumerId);

        // Atualize o valor do campo "suspended" para true
        consumidoreRef.update({ isSuspended: true })
        .then(() => {
        alert("Consumidor suspenso com sucesso!");
        window.location.reload(); // Recarregue a página para refletir as alterações
        })
        .catch((error) => {
        console.error("Erro ao suspender Consumidor: ", error);
        alert("Erro ao suspender o consumidor. Por favor, tente novamente mais tarde.");
        });
        }

    }
    function deleteConsumidor(){
 // Lógica para suspender o e-commerce por um tempo
    console.log('Consumidor eliminado');

        // Pergunta ao usuário se ele realmente deseja suspender o e-commerce
        const confirmEliminacao = confirm("Tem certeza de que deseja eleminar este consumidor?");

        if (confirmEliminacao) {
        // Se o usuário confirmar, execute a eliminacao

        // obter o ID do consumidor
        const consumerId = getParameterByName('consumerId');

        console.log(consumerId);

        const consumidoreRef = feedbackAquiDB2.child("consumidores").child(consumerId);

        // Atualize o valor do campo "suspended" para true
        consumidoreRef.update({ isRemoved: true })
        .then(() => {
        alert("Consumidor eliminado com sucesso!");
        window.location.reload(); // Recarregue a página para refletir as alterações
        })
        .catch((error) => {
        console.error("Erro ao eliminar o Consumidor: ", error);
        alert("Erro ao eliminar o consumidor. Por favor, tente novamente mais tarde.");
        });
        }

    }
